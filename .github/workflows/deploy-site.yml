name: Deploy AgentTrace Site

on:
  push:
    branches: [main]
    paths:
      - "agentrace-site/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentrace-site

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentrace-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate OG image
        run: npm run og

      - name: Build site
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: agentrace-site
          vercel-args:       "--prod"
